name: Deploy PULSE-X AGENCY to OVH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 1. Préparer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 2. Installer, Vérifier (Audit/Lint) et Construire
        run: |
          npm install
          npm audit --audit-level=high
          npm run lint --if-present
          npm run build

      - name: 3. Préparer le dossier sur le serveur
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo mkdir -p /var/www/pulsexmanagement.com
            sudo chown -R ubuntu:ubuntu /var/www/pulsexmanagement.com
            sudo rm -rf /var/www/pulsexmanagement.com/*

      - name: 4. Envoyer les fichiers prêts au serveur
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist"
          target: "/var/www/pulsexmanagement.com/"
          strip_components: 1

      - name: 5. Sécuriser les droits pour Nginx
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo chown -R www-data:www-data /var/www/pulsexmanagement.com/

      - name: 6. Configurer Nginx et SSL (Certbot)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            DOMAIN="pulsexmanagement.com"

            if [ ! -d /etc/letsencrypt/live/$DOMAIN ]; then
              # Première installation : config HTTP simple pour que Certbot puisse faire son challenge
              sudo tee /etc/nginx/sites-available/$DOMAIN > /dev/null <<'NGINXEOF'
            server {
                server_name pulsexmanagement.com www.pulsexmanagement.com;
                limit_req zone=mylimit burst=20 nodelay;
                include conf.d/security-headers.conf;

                root /var/www/pulsexmanagement.com;
                index index.html;

                location / {
                    try_files $uri $uri/ /index.html;
                }

                listen 80;
                listen [::]:80;
            }
            NGINXEOF

              # Activer le vhost en HTTP
              sudo ln -sf /etc/nginx/sites-available/$DOMAIN /etc/nginx/sites-enabled/$DOMAIN
              sudo nginx -t && sudo systemctl reload nginx

              # Certbot obtient le certificat et ajoute lui-même le bloc SSL dans la config
              sudo certbot --nginx \
                -d $DOMAIN \
                -d www.$DOMAIN \
                --non-interactive \
                --agree-tos \
                --email ${{ secrets.CERTBOT_EMAIL }}
            else
              # Certificat déjà présent : activer le vhost si besoin et recharger
              if [ ! -L /etc/nginx/sites-enabled/$DOMAIN ]; then
                sudo ln -s /etc/nginx/sites-available/$DOMAIN /etc/nginx/sites-enabled/$DOMAIN
              fi
            fi

            sudo nginx -t && sudo systemctl reload nginx
